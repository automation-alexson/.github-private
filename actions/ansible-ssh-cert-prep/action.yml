name: Ansible SSH certificate prep
description: Load automation SSH key and CA signer; issue a short-lived OpenSSH user certificate for Ansible.

inputs:
  signing_project_id:
    description: Infisical project UUID containing ssh-user-ca-private-key
    required: true
  principal:
    description: Certificate principal (-n)
    required: false
    default: automation
  cert_ttl:
    description: Validity interval for ssh-keygen -V (e.g. 1h, 30m)
    required: false
    default: 1h
  cert_identity:
    description: Certificate identity (-I); default gha-<run_id>
    required: false
    default: ""
  infisical_domain:
    description: Infisical API base URL
    required: false
    default: https://vault.svc.eh168.alexson.org
  env_slug:
    description: Infisical environment slug
    required: false
    default: prod
  signing_secret_path:
    description: Infisical folder for CA private key
    required: false
    default: /
  signing_secret_key:
    description: Infisical secret key for CA private key
    required: false
    default: ssh-user-ca-private-key
  ansible_secret_path:
    description: Infisical folder for automation private key
    required: false
    default: /Ansible
  ansible_secret_key:
    description: Infisical secret key for automation private key
    required: false
    default: ansible-ssh-private-key

outputs:
  ansible_ssh_private_key_file:
    description: Path to automation private key file
    value: ${{ steps.sign.outputs.key_file }}
  ansible_ssh_certificate_file:
    description: Path to signed OpenSSH user certificate
    value: ${{ steps.sign.outputs.cert_file }}
  ansible_ssh_common_args:
    description: SSH client args for CertificateFile (also in GITHUB_ENV)
    value: ${{ steps.sign.outputs.ssh_common_args }}

runs:
  using: composite
  steps:
    - name: Load Ansible SSH private key from Infisical (OIDC)
      uses: infrastructure-alexson/.github-private/actions/infisical-oidc-load@v1
      with:
        infisical_domain: ${{ inputs.infisical_domain }}
        env_slug: ${{ inputs.env_slug }}
        secret_path: ${{ inputs.ansible_secret_path }}
        recursive: "false"
        secret_keys: ${{ inputs.ansible_secret_key }}

    - name: Load CA signing key from Infisical (OIDC)
      uses: infrastructure-alexson/.github-private/actions/infisical-oidc-load@v1
      with:
        infisical_domain: ${{ inputs.infisical_domain }}
        env_slug: ${{ inputs.env_slug }}
        project_id: ${{ inputs.signing_project_id }}
        secret_path: ${{ inputs.signing_secret_path }}
        recursive: "false"
        secret_keys: ${{ inputs.signing_secret_key }}

    - name: Sign OpenSSH user certificate
      id: sign
      shell: bash
      env:
        PRINCIPAL: ${{ inputs.principal }}
        CERT_TTL: ${{ inputs.cert_ttl }}
        CERT_IDENTITY: ${{ inputs.cert_identity != '' && inputs.cert_identity || format('gha-{0}', github.run_id) }}
      run: |
        set +x
        set -euo pipefail
        umask 077

        key="${ANSIBLE_SSH_PRIVATE_KEY:-}"
        ca="${SSH_USER_CA_PRIVATE_KEY:-}"
        if [ -z "$key" ]; then
          echo "::error::ANSIBLE_SSH_PRIVATE_KEY is not set (Infisical ${{ inputs.ansible_secret_key }})."
          exit 1
        fi
        if [ -z "$ca" ]; then
          echo "::error::SSH_USER_CA_PRIVATE_KEY is not set (signing project ${{ inputs.signing_project_id }})."
          exit 1
        fi

        key_file="${RUNNER_TEMP}/ansible-automation-key"
        ca_file="${RUNNER_TEMP}/ssh-user-ca-private-key"
        pub_file="${key_file}.pub"
        cert_file="${key_file}-cert.pub"

        printf '%s\n' "$key" > "$key_file"
        printf '%s\n' "$ca" > "$ca_file"
        chmod 600 "$key_file" "$ca_file"

        ssh-keygen -y -f "$key_file" > "$pub_file"
        ssh-keygen -s "$ca_file" \
          -I "$CERT_IDENTITY" \
          -n "$PRINCIPAL" \
          -V "+${CERT_TTL}" \
          "$pub_file"

        if [ ! -f "$cert_file" ]; then
          echo "::error::Expected certificate at ${cert_file}"
          exit 1
        fi
        chmod 644 "$cert_file"

        common_args="-o CertificateFile=${cert_file} -o IdentitiesOnly=yes"
        echo "ANSIBLE_SSH_PRIVATE_KEY_FILE=${key_file}" >> "$GITHUB_ENV"
        echo "ANSIBLE_SSH_CERTIFICATE_FILE=${cert_file}" >> "$GITHUB_ENV"
        echo "ANSIBLE_SSH_COMMON_ARGS=${common_args}" >> "$GITHUB_ENV"

        echo "key_file=${key_file}" >> "$GITHUB_OUTPUT"
        echo "cert_file=${cert_file}" >> "$GITHUB_OUTPUT"
        echo "ssh_common_args=${common_args}" >> "$GITHUB_OUTPUT"

        rm -f "$ca_file" "$pub_file"
