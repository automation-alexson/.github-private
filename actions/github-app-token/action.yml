name: GitHub App installation token
description: Mint a short-lived installation token for cross-repo checkout or GitHub API (contents read).

inputs:
  app_id:
    description: GitHub App ID (numeric)
    required: true
  private_key:
    description: GitHub App PEM private key
    required: true
  owner:
    description: Organization or user that installed the app
    required: true
  repositories:
    description: Comma-separated repository names to scope (optional; empty = all repos the app can access)
    required: false
    default: ""

outputs:
  token:
    description: Installation access token (expires in about one hour)
    value: ${{ steps.create_token.outputs.token }}

runs:
  using: composite
  steps:
    - name: Create installation access token
      id: create_token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.private_key }}
        owner: ${{ inputs.owner }}
        repositories: ${{ inputs.repositories }}
