# Reusable workflow: fetch Infisical secrets into .env and upload for caller jobs.
name: Infisical Fetch

on:
  workflow_call:
    inputs:
      infisical_domain:
        description: Infisical API base URL (self-hosted SITE_URL, no trailing slash)
        required: false
        type: string
        default: https://vault.svc.eh168.alexson.org
      env_slug:
        description: Infisical environment slug
        required: false
        type: string
        default: prod
      project_slug:
        description: Infisical project slug
        required: false
        type: string
        default: Secrets
      identity_id:
        description: Machine identity ID (must have OIDC auth enabled in Infisical UI)
        required: false
        type: string
        default: 8977b274-e440-4612-9097-69faf3ecbe2a
      oidc_audience:
        description: Optional aud claim for GitHub ID token (default = org URL for caller repo)
        required: false
        type: string
        default: ""
      secret_path:
        description: Infisical secret path
        required: false
        type: string
        default: /
    outputs:
      env-artifact-name:
        description: Artifact name containing the .env file
        value: ${{ jobs.fetch-and-run.outputs.env-artifact-name }}

jobs:
  fetch-and-run:
    runs-on: [self-hosted, linux, infra]
    permissions:
      id-token: write
      contents: read
    outputs:
      env-artifact-name: ${{ steps.meta.outputs.name }}

    steps:
      - name: Set artifact name output
        id: meta
        run: echo "name=infisical-env" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch secrets from Infisical via OIDC
        id: infisical
        env:
          INFISICAL_DOMAIN: ${{ inputs.infisical_domain }}
          IDENTITY_ID: ${{ inputs.identity_id }}
          ENV_SLUG: ${{ inputs.env_slug }}
          PROJECT_SLUG: ${{ inputs.project_slug }}
          SECRET_PATH: ${{ inputs.secret_path }}
          OIDC_AUDIENCE: ${{ inputs.oidc_audience != '' && inputs.oidc_audience || format('https://github.com/{0}', github.repository_owner) }}
        run: |
          set -euo pipefail
          JWT_FILE="${RUNNER_TEMP}/github-oidc.jwt"
          export JWT_FILE

          URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${OIDC_AUDIENCE}"
          curl -sf -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$URL" | jq -r '.value' > "$JWT_FILE"

          python3 <<'PY'
          import base64, json, os, sys, urllib.parse, urllib.request
          from pathlib import Path

          domain = os.environ["INFISICAL_DOMAIN"].rstrip("/")
          identity_id = os.environ["IDENTITY_ID"]
          env_slug = os.environ["ENV_SLUG"]
          project_slug = os.environ["PROJECT_SLUG"]
          secret_path = os.environ["SECRET_PATH"]
          jwt = open(os.environ["JWT_FILE"], encoding="utf-8").read().strip()

          b64 = jwt.split(".")[1]
          b64 += "=" * (-len(b64) % 4)
          payload = json.loads(base64.urlsafe_b64decode(b64))
          keys = ("sub", "aud", "iss", "repository", "ref", "environment", "workflow_ref", "job_workflow_ref")
          claims = {k: payload.get(k) for k in keys}
          print("::notice title=OIDC claims for Infisical::Set Subject and Audiences to these exact values:")
          print(json.dumps(claims, indent=2))

          login_body = urllib.parse.urlencode({"identityId": identity_id, "jwt": jwt}).encode()
          login_req = urllib.request.Request(
              f"{domain}/api/v1/auth/oidc-auth/login",
              data=login_body,
              method="POST",
              headers={"Content-Type": "application/x-www-form-urlencoded"},
          )
          try:
              with urllib.request.urlopen(login_req) as resp:
                  login_json = json.load(resp)
          except urllib.error.HTTPError as exc:
              body = exc.read().decode(errors="replace")
              print(f"::error::Infisical OIDC login failed ({exc.code}): {body}", file=sys.stderr)
              print(
                  "::error::In Infisical, set Subject to the sub value and Audiences to the aud value above (exact match; avoid globs on v0.158.x).",
                  file=sys.stderr,
              )
              sys.exit(1)

          token = login_json.get("accessToken")
          if not token:
              print(f"::error::No accessToken in response: {login_json}", file=sys.stderr)
              sys.exit(1)

          params = urllib.parse.urlencode(
              {
                  "secretPath": secret_path,
                  "environment": env_slug,
                  "workspaceSlug": project_slug,
                  "include_imports": "true",
                  "recursive": "false",
                  "expandSecretReferences": "true",
              }
          )
          secrets_req = urllib.request.Request(
              f"{domain}/api/v3/secrets/raw?{params}",
              headers={"Authorization": f"Bearer {token}"},
          )
          with urllib.request.urlopen(secrets_req) as resp:
              secrets_json = json.load(resp)

          values: dict[str, str] = {
              s["secretKey"]: s["secretValue"] for s in secrets_json.get("secrets", [])
          }
          for imp in reversed(secrets_json.get("imports") or []):
              for s in imp.get("secrets") or []:
                  values.setdefault(s["secretKey"], s["secretValue"])

          lines = []
          for key, value in values.items():
              escaped = value.replace("\\", "\\\\").replace("'", "\\'")
              lines.append(f"{key}='{escaped}'")
          Path(".env").write_text("\n".join(lines) + ("\n" if lines else ""), encoding="utf-8")
          print(f"::notice::Infisical exported {len(lines)} secret(s) to .env")
          PY

      - name: Verify .env was created
        run: |
          set -euo pipefail
          test -s .env
          echo "::notice::Keys in .env:"
          cut -d= -f1 .env

      - name: Upload .env artifact for caller workflows
        id: upload-env
        uses: actions/upload-artifact@v4
        with:
          name: infisical-env
          path: .env
          retention-days: 1
          if-no-files-found: error
