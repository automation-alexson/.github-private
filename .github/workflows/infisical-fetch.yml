# Reusable workflow: fetch Infisical secrets into .env and upload for caller jobs.
name: Infisical Fetch

on:
  workflow_call:
    inputs:
      infisical_domain:
        description: Infisical API base URL (self-hosted SITE_URL, no trailing slash)
        required: false
        type: string
        default: https://vault.svc.eh168.alexson.org
      env_slug:
        description: Infisical environment slug
        required: false
        type: string
        default: prod
      project_slug:
        description: Infisical project slug
        required: false
        type: string
        default: Secrets
      identity_id:
        description: Machine identity ID (must have OIDC auth enabled in Infisical UI)
        required: false
        type: string
        default: 8977b274-e440-4612-9097-69faf3ecbe2a
      oidc_audience:
        description: Optional aud claim for GitHub ID token (default = org URL for caller repo)
        required: false
        type: string
        default: ""
      debug_oidc:
        description: Print GitHub OIDC sub/aud/iss before fetch (for Infisical identity binding)
        required: false
        type: boolean
        default: false
    outputs:
      env-artifact-name:
        description: Artifact name containing the .env file
        value: ${{ jobs.fetch-and-run.outputs.env-artifact-name }}

jobs:
  fetch-and-run:
    runs-on: [self-hosted, linux, infra]
    permissions:
      id-token: write
      contents: read
    outputs:
      env-artifact-name: ${{ steps.meta.outputs.name }}

    steps:
      - name: Set artifact name output
        id: meta
        run: echo "name=infisical-env" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug GitHub OIDC token claims
        if: inputs.debug_oidc
        env:
          OIDC_AUDIENCE: ${{ inputs.oidc_audience != '' && inputs.oidc_audience || format('https://github.com/{0}', github.repository_owner) }}
        run: |
          set -euo pipefail
          URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${OIDC_AUDIENCE}"
          TOKEN=$(curl -sf -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$URL" | jq -r '.value')
          export TOKEN
          python3 <<'PY'
          import base64, json, os
          b64 = os.environ["TOKEN"].split(".")[1]
          b64 += "=" * (-len(b64) % 4)
          payload = json.loads(base64.urlsafe_b64decode(b64))
          keys = ("sub", "aud", "iss", "repository", "ref", "environment", "workflow_ref")
          print("::notice::Use these values in Infisical → Organization → Identities → OIDC Auth:")
          print(json.dumps({k: payload.get(k) for k in keys}, indent=2))
          PY

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          domain: ${{ inputs.infisical_domain }}
          identity-id: ${{ inputs.identity_id }}
          oidc-audience: ${{ inputs.oidc_audience }}
          env-slug: ${{ inputs.env_slug }}
          project-slug: ${{ inputs.project_slug }}
          export-type: file
          file-output-path: .env

      - name: Verify .env was created
        run: |
          set -euo pipefail
          test -s .env
          echo "::notice::Infisical exported $(wc -l < .env) line(s) to .env (keys only, not values)."

      - name: Upload .env artifact for caller workflows
        id: upload-env
        uses: actions/upload-artifact@v4
        with:
          name: infisical-env
          path: .env
          retention-days: 1
          if-no-files-found: error
