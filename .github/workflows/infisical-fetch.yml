# .github/workflows/reusable-infisical-fetch.yml
name: Infisical Fetch

on:
  workflow_call:
    inputs:
      env-name:
        required: true
        type: string # e.g., 'dev', 'prod'
      project-id:
        required: true
        type: string

jobs:
  fetch-and-run:
    runs-on: [self-hosted, linux, infra]
    # Required for OIDC authentication
    permissions:
      id-token: write
      contents: read
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Connects to Infisical and injects secrets as environment variables
      - name: Fetch Secrets from Infisical
        uses: Infisical/secrets-action@v1
        with:
          client-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG }}
          project-id: ${{ vars.INFISICAL_SECRETS_PROJECT_ID }}
          # Specifying OIDC means no static client-secret is needed
          auth-method: 'oidc' 
