# Reusable workflow: fetch Infisical secrets into .env and upload for caller jobs.
name: Infisical Fetch

on:
  workflow_call:
    inputs:
      infisical_domain:
        description: Infisical API base URL (self-hosted SITE_URL, no trailing slash)
        required: false
        type: string
        default: https://vault.svc.eh168.alexson.org
      env_slug:
        description: Infisical environment slug
        required: false
        type: string
        default: prod
      project_slug:
        description: Infisical project slug (used when project_id is empty)
        required: false
        type: string
        default: secrets-vi-5-a
      project_id:
        description: Infisical project UUID (from project URL; preferred on v0.160+)
        required: false
        type: string
        default: ""
      identity_id:
        description: Machine identity ID (must have OIDC auth enabled in Infisical UI)
        required: false
        type: string
        default: 8977b274-e440-4612-9097-69faf3ecbe2a
      oidc_audience:
        description: Optional aud claim for GitHub ID token (default = org URL for caller repo)
        required: false
        type: string
        default: ""
      secret_path:
        description: Infisical folder path (use / for all folders when recursive is true)
        required: false
        type: string
        default: /
      recursive:
        description: Include secrets in subfolders (required if secrets live under e.g. /Ansible)
        required: false
        type: boolean
        default: true
    outputs:
      env-artifact-name:
        description: Artifact name containing the .env file
        value: ${{ jobs.fetch-and-run.outputs.env-artifact-name }}

jobs:
  fetch-and-run:
    runs-on: [self-hosted, linux, infra]
    permissions:
      id-token: write
      contents: read
    outputs:
      env-artifact-name: ${{ steps.meta.outputs.name }}

    steps:
      - name: Set artifact name output
        id: meta
        run: echo "name=infisical-env" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch secrets from Infisical via OIDC
        id: infisical
        env:
          INFISICAL_DOMAIN: ${{ inputs.infisical_domain }}
          IDENTITY_ID: ${{ inputs.identity_id }}
          ENV_SLUG: ${{ inputs.env_slug }}
          PROJECT_SLUG: ${{ inputs.project_slug }}
          PROJECT_ID: ${{ inputs.project_id }}
          SECRET_PATH: ${{ inputs.secret_path }}
          RECURSIVE: ${{ inputs.recursive }}
          OIDC_AUDIENCE: ${{ inputs.oidc_audience != '' && inputs.oidc_audience || format('https://github.com/{0}', github.repository_owner) }}
        run: |
          set -euo pipefail
          JWT_FILE="${RUNNER_TEMP}/github-oidc.jwt"
          export JWT_FILE

          URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${OIDC_AUDIENCE}"
          curl -sf -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "$URL" | jq -r '.value' > "$JWT_FILE"

          python3 <<'PY'
          import base64, json, os, sys, urllib.parse, urllib.request
          from pathlib import Path

          domain = os.environ["INFISICAL_DOMAIN"].rstrip("/")
          identity_id = os.environ["IDENTITY_ID"]
          env_slug = os.environ["ENV_SLUG"]
          project_slug = os.environ["PROJECT_SLUG"]
          project_id = os.environ.get("PROJECT_ID", "").strip()
          secret_path = os.environ["SECRET_PATH"]
          recursive = os.environ.get("RECURSIVE", "true").lower() in ("1", "true", "yes")
          jwt = open(os.environ["JWT_FILE"], encoding="utf-8").read().strip()

          b64 = jwt.split(".")[1]
          b64 += "=" * (-len(b64) % 4)
          payload = json.loads(base64.urlsafe_b64decode(b64))
          keys = ("sub", "aud", "iss", "repository", "ref", "environment", "workflow_ref", "job_workflow_ref")
          claims = {k: payload.get(k) for k in keys}
          print("::notice title=OIDC claims for Infisical::Set Subject and Audiences to these exact values:")
          print(json.dumps(claims, indent=2))

          login_body = urllib.parse.urlencode({"identityId": identity_id, "jwt": jwt}).encode()
          login_req = urllib.request.Request(
              f"{domain}/api/v1/auth/oidc-auth/login",
              data=login_body,
              method="POST",
              headers={"Content-Type": "application/x-www-form-urlencoded"},
          )
          try:
              with urllib.request.urlopen(login_req) as resp:
                  login_json = json.load(resp)
          except urllib.error.HTTPError as exc:
              body = exc.read().decode(errors="replace")
              print(f"::error::Infisical OIDC login failed ({exc.code}): {body}", file=sys.stderr)
              hint = "Check Subject and Audiences against sub/aud above."
              if "claim not allowed" in body.lower():
                  hint = (
                      "Subject/Audience matched; failure is in Infisical **Claims** (bound claims). "
                      "Remove all rows under Claims and Claim metadata mapping, save, and re-run."
                  )
              elif "subject not allowed" in body.lower():
                  hint = "Set Subject to sub above, or repo:*-alexson/* on v0.160.4+."
              elif "audience not allowed" in body.lower():
                  hint = "Set Audiences to aud above, or https://github.com/*-alexson."
              print(f"::error::{hint}", file=sys.stderr)
              sys.exit(1)

          token = login_json.get("accessToken")
          if not token:
              print(f"::error::No accessToken in response: {login_json}", file=sys.stderr)
              sys.exit(1)

          if not project_id:
              slug_req = urllib.request.Request(
                  f"{domain}/api/v1/projects/slug/{urllib.parse.quote(project_slug, safe='')}",
                  headers={"Authorization": f"Bearer {token}"},
              )
              try:
                  with urllib.request.urlopen(slug_req) as resp:
                      project_json = json.load(resp)
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode(errors="replace")
                  print(
                      f"::error::Project '{project_slug}' lookup failed ({exc.code}): {body}",
                      file=sys.stderr,
                  )
                  if "ProjectMembershipNotFound" in body or "not a member of this project" in body:
                      print(
                          "::error::Add this machine identity to the project: "
                          "Project secrets-vi-5-a → Settings → Access Control → Machine Identities → Add identity "
                          f"({identity_id}) with a role that can read secrets in {env_slug}.",
                          file=sys.stderr,
                      )
                  else:
                      print(
                          "::error::Check project_slug or pass project_id from the Infisical project URL.",
                          file=sys.stderr,
                      )
                  sys.exit(1)
              project_id = project_json.get("id") or project_json.get("_id") or ""
              if not project_id:
                  print(f"::error::Project lookup returned no id: {project_json}", file=sys.stderr)
                  sys.exit(1)
              print(f"::notice::Resolved project slug '{project_slug}' -> {project_id}")

          params = urllib.parse.urlencode(
              {
                  "secretPath": secret_path,
                  "environment": env_slug,
                  "projectId": project_id,
                  "includeImports": "true",
                  "recursive": "true" if recursive else "false",
                  "expandSecretReferences": "true",
                  "viewSecretValue": "true",
              }
          )
          secrets_req = urllib.request.Request(
              f"{domain}/api/v4/secrets/?{params}",
              headers={"Authorization": f"Bearer {token}"},
          )
          try:
              with urllib.request.urlopen(secrets_req) as resp:
                  secrets_json = json.load(resp)
          except urllib.error.HTTPError as exc:
              body = exc.read().decode(errors="replace")
              print(f"::error::Infisical secrets export failed ({exc.code}): {body}", file=sys.stderr)
              print(
                  f"::error::Verify project_id, env_slug ({env_slug}), secret_path ({secret_path}), and machine identity access to the project.",
                  file=sys.stderr,
              )
              sys.exit(1)

          values: dict[str, str] = {
              s["secretKey"]: s["secretValue"] for s in secrets_json.get("secrets", [])
          }
          for imp in reversed(secrets_json.get("imports") or []):
              for s in imp.get("secrets") or []:
                  values.setdefault(s["secretKey"], s["secretValue"])

          if not values:
              print(
                  f"::error::No secrets returned for project={project_id} environment={env_slug} "
                  f"secretPath={secret_path} recursive={recursive}.",
                  file=sys.stderr,
              )
              print(
                  "::error::In Infisical, confirm secrets exist in that environment (slug must match env_slug, e.g. prod), "
                  "often under folder /Ansible. Check the machine identity role can read secret values.",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"::notice::Secret keys: {', '.join(sorted(values.keys()))}")

          lines = []
          for key, value in values.items():
              escaped = value.replace("\\", "\\\\").replace("'", "\\'")
              lines.append(f"{key}='{escaped}'")
          Path(".env").write_text("\n".join(lines) + ("\n" if lines else ""), encoding="utf-8")
          print(f"::notice::Infisical exported {len(lines)} secret(s) to .env")
          PY

      - name: Verify .env was created
        run: |
          set -euo pipefail
          test -s .env
          echo "::notice::Keys in .env:"
          cut -d= -f1 .env

      - name: Upload .env artifact for caller workflows
        id: upload-env
        uses: actions/upload-artifact@v4
        with:
          name: infisical-env
          path: .env
          retention-days: 1
          if-no-files-found: error
